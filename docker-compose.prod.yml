services:
  db:
    image: postgres:16-alpine
    container_name: mkomplekt-db
    restart: unless-stopped
    env_file:
      - backend/.env.production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: mkomplekt-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - backend/.env.production
    volumes:
      - media_data:/app/media
    expose:
      - "8000"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mkomplekt-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"

volumes:
  postgres_data:
  media_data:
